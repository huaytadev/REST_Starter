version: "3.9"

services:

  app:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: reststarter-app

    restart: unless-stopped

    ports:
      - "8080:8080"

    env_file:
      - .env

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - backend-network

  mysql:

    image: mysql:8.4

    container_name: reststarter-mysql

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    networks:
      - backend-network

volumes:

  mysql-data:

networks:

  backend-network:
    driver: bridge